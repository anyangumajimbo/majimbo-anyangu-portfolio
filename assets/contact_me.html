<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hire Me</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">


    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- linking custom fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>

<body style="background-color: #061e24;">
    <div class="min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row g-5 text-white align-items-start">
                <div class="col-lg-5">
                    <h1 class="mb-3">Let's Collaborate</h1>
                    <p class="text-white-50 mb-4">Tell me about your project, timeline, or any specific goals. I respond within a day and can arrange a quick call if needed.</p>
                    <div class="d-flex flex-wrap align-items-center gap-2 fs-4">
                        <a href="https://www.linkedin.com/in/anyangu-majimbo-b30018235/" target="_blank" rel="noopener" class="text-white"><i class="bi bi-linkedin"></i></a>
                        <a href="https://github.com/anyangumajimbo" target="_blank" rel="noopener" class="text-white"><i class="bi bi-github"></i></a>
                        <a href="mailto:majimboanyangu50@gmail.com" class="text-white"><i class="bi bi-envelope-fill"></i></a>
                        <a href="tel:+33743624272" class="text-white"><i class="bi bi-telephone-fill"></i></a>
                        <a href="https://wa.me/33743624272" target="_blank" rel="noopener" class="text-white"><i class="bi bi-whatsapp"></i></a>
                    </div>
                </div>
                <div class="col-lg-7">
                    <form action="https://formspree.io/f/mdalnpbd" method="POST" class="p-4 rounded-4" style="background-color: rgba(255, 255, 255, 0.08);">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" name="name" id="name" class="form-control" placeholder="Jane Doe" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" name="email" id="email" class="form-control" placeholder="you@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea name="message" id="message" rows="5" class="form-control" placeholder="How can I help?" required></textarea>
                        </div>
                        <div class="text-end">
                            <button type="submit" class="btn btn-success px-4">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
