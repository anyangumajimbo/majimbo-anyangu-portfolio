<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hire Me</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- linking custom fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />

    <style>
  .language-switcher {
    top: 15px;
  }
</style>

  </head>

  <body style="background-color: #061e24">
    <!-- Language Switcher -->
    <div class="language-switcher" id="language-switcher">
      <button class="lang-toggle-btn" id="lang-toggle-btn">
        <img src="https://flagcdn.com/w40/gb.png" alt="" id="lang-current-flag">
        <span id="lang-current-label">EN</span>
        <i class="bi bi-chevron-down lang-chevron"></i>
      </button>
      <div class="lang-dropdown" id="lang-dropdown">
        <button class="lang-option" data-lang="en">
          <img src="https://flagcdn.com/w40/gb.png" alt="English">
          <span>EN - English</span>
        </button>
        <button class="lang-option" data-lang="fr">
          <img src="https://flagcdn.com/w40/fr.png" alt="Français">
          <span>FR - Français</span>
        </button>
      </div>
    </div>
    <div class="min-vh-100 d-flex align-items-center py-5">
      <div class="container">
        <div class="row g-5 text-white align-items-start">
          <div class="col-lg-5">
            <h1 class="mb-3" data-i18n="contact-title">Let's Collaborate</h1>
            <p class="text-white-50 mb-4" data-i18n="contact-desc">
              Tell me about your project, timeline, or any specific goals. I
              respond within a day and can arrange a quick call if needed.
            </p>
            <div class="d-flex flex-wrap align-items-center gap-2 fs-4">
              <a
                href="https://www.linkedin.com/in/anyangu-majimbo-b30018235/"
                target="_blank"
                rel="noopener"
                class="text-white"
                ><i class="bi bi-linkedin"></i
              ></a>
              <a
                href="https://github.com/anyangumajimbo"
                target="_blank"
                rel="noopener"
                class="text-white"
                ><i class="bi bi-github"></i
              ></a>
              <a href="mailto:majimboanyangu50@gmail.com" class="text-white"
                ><i class="bi bi-envelope-fill"></i
              ></a>
              <a href="tel:+33743624272" class="text-white"
                ><i class="bi bi-telephone-fill"></i
              ></a>
              <a
                href="https://wa.me/33743624272"
                target="_blank"
                rel="noopener"
                class="text-white"
                ><i class="bi bi-whatsapp"></i
              ></a>
            </div>
          </div>
          <div class="col-lg-7">
            <form
              action="https://formspree.io/f/mdalnpbd"
              method="POST"
              class="p-4 rounded-4"
              style="background-color: rgba(255, 255, 255, 0.08)"
            >
              <div class="mb-3">
                <label
                  for="name"
                  class="form-label"
                  data-i18n="contact-form-name"
                  >Full Name</label
                >
                <input
                  type="text"
                  name="name"
                  id="name"
                  class="form-control"
                  data-placeholder="contact-form-name-placeholder"
                  placeholder="Jane Doe"
                  required
                />
              </div>
              <div class="mb-3">
                <label
                  for="email"
                  class="form-label"
                  data-i18n="contact-form-email"
                  >Email Address</label
                >
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="form-control"
                  data-placeholder="contact-form-email-placeholder"
                  placeholder="you@example.com"
                  required
                />
              </div>
              <div class="mb-3">
                <label
                  for="message"
                  class="form-label"
                  data-i18n="contact-form-message"
                  >Message</label
                >
                <textarea
                  name="message"
                  id="message"
                  rows="5"
                  class="form-control"
                  data-placeholder="contact-form-message-placeholder"
                  placeholder="How can I help?"
                  required
                ></textarea>
              </div>
              <div class="text-end">
                <button
                  type="submit"
                  class="btn btn-primary px-4"
                  data-i18n="contact-form-submit"
                >
                  Send Message
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="../assets/js/translations.js"></script>
    <script>
      (function () {
        const langData = {
          en: { flag: 'https://flagcdn.com/w40/gb.png', label: 'EN' },
          fr: { flag: 'https://flagcdn.com/w40/fr.png', label: 'FR' }
        };

        let currentLanguage = localStorage.getItem('language-preference') || 'en';

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }

        function init() {
          setLanguage(currentLanguage);

          const toggleBtn = document.getElementById('lang-toggle-btn');
          const switcher = document.getElementById('language-switcher');

          if (toggleBtn) {
            toggleBtn.addEventListener('click', function (e) {
              e.stopPropagation();
              switcher.classList.toggle('open');
            });
          }

          document.querySelectorAll('.lang-option').forEach(function (btn) {
            btn.addEventListener('click', function () {
              setLanguage(btn.getAttribute('data-lang'));
              switcher.classList.remove('open');
            });
          });

          document.addEventListener('click', function (e) {
            if (switcher && !switcher.contains(e.target)) {
              switcher.classList.remove('open');
            }
          });
        }

        function setLanguage(lang) {
          currentLanguage = lang;
          localStorage.setItem('language-preference', lang);
          updateAllTranslations(lang);
          updateSwitcherUI();
          document.documentElement.lang = lang;
        }

        function updateAllTranslations(lang) {
          document.querySelectorAll('[data-i18n]').forEach(function (element) {
            const key = element.getAttribute('data-i18n');
            if (translations && translations[lang] && translations[lang][key]) {
              element.textContent = translations[lang][key];
            }
          });

          document.querySelectorAll('[data-placeholder]').forEach(function (element) {
            const key = element.getAttribute('data-placeholder');
            if (translations && translations[lang] && translations[lang][key]) {
              element.placeholder = translations[lang][key];
            }
          });
        }

        function updateSwitcherUI() {
          const flagEl = document.getElementById('lang-current-flag');
          const labelEl = document.getElementById('lang-current-label');
          if (flagEl) flagEl.src = langData[currentLanguage].flag;
          if (labelEl) labelEl.textContent = langData[currentLanguage].label;

          document.querySelectorAll('.lang-option').forEach(function (btn) {
            btn.classList.toggle('active', btn.getAttribute('data-lang') === currentLanguage);
          });
        }
      })();
    </script>
  </body>
</html>
